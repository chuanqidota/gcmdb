version: '3'
services:
  # mysql
  mysql:
    image: mysql:latest
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: jinang123
      MYSQL_DATABASE: gcmdb
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  # redis
  redis:
    image: redis:latest
    restart: always
    ports:
      - "6379:6379"

  # 后端
  gcmdb:
    restart: always
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: gcmdb:latest
    container_name: gcmdb
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - elasticsearch

  # 前端
  gcmdb-web:
    restart: always
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: gcmdb-web:latest
    container_name: gcmdb-web
    ports:
      - "80:80"
    depends_on:
      - gcmdb

volumes:
  mysql_data:
